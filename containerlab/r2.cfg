hostname r2

username admin privilege 15 role network-admin secret admin

ip routing

interface Ethernet1
   no switchport
   ip address 10.0.2.1/24

interface Ethernet2
   no switchport
   ip address 192.168.254.2/30

interface Management0
   ip address 172.20.20.5/24

ip route 10.0.1.0/24 192.168.254.1

!
! --- NETCONF ---
management api netconf
   transport ssh default
   port 830
   no shutdown
!

!
! --- gNMI ---
management api gnmi
   transport grpc default
      port 6030
      no shutdown
!

end