configure

hostname r1

username admin privilege 15 role network-admin secret admin

ip routing

interface Ethernet1
   no switchport
   ip address 10.0.1.1/24

interface Ethernet2
   no switchport
   ip address 192.168.254.1/30

interface Management0
   ip address 172.20.20.4/24
   no ipv6 address

ip route 10.0.2.0/24 192.168.254.2

!
! --- NETCONF ---
management api netconf
   transport ssh default
   port 830
   no shutdown
!

!
! --- gNMI (TLS AUTOMÁTICO DE CONTAINERLAB) ---
management api gnmi
   transport grpc openmgmt
      ssl profile test-arista
   provider eos-native
      port 6030
      no shutdown
!
management security
   ssl profile test-arista
      certificate node.crt key node.key
      trust certificate ca.crt
!
end
write memory